# macOS defaults sync configuration.
#
# Rules:
#   - com.apple.* domains: EXCLUDED by default. Whitelist with +domain.
#   - All other domains: INCLUDED by default. Blacklist with !domain.
#   - Per-key blacklists: +domain !pattern1 !pattern2 ...
#   - NSGlobalDomain is special-cased (always included, with key blacklist).
#   - * !pattern: global key blacklist (applied to all included domains).

# --- Global key blacklists (applied to all included domains) ---
* !SULastCheckTime !SULastProfileSubmissionDate !SUHasLaunchedBefore !SUUpdateGroupIdentifier !SUUpdateRelaunchingMarker !NSWindow Frame* !NSNav* !NSStatusItem Preferred Position* !NSToolbar Configuration*

