# Language Servers

[language-server.rust-analyzer]
config = { check = { command = "clippy", extraArgs = ["--", "--force-warn", "clippy::pedantic", "-Dwarnings"] }, diagnostics = { styleLints = { enable = true } }, inlayHints = { closureStyle = "rust_analyzer", typeHints = { hideNamedConstructor = true, hideClosureInitialization = true }, expressionAdjustmentHints = { enable = "reborrow" }, closureCaptureHints = { enable = true } } }

[language-server.biome]
command = "bunx"
args = ["biome", "lsp-proxy"]

[language-server.vscode-eslint-language-server]
command = "vscode-eslint-language-server"
args = ["--stdio"]

[language-server.vscode-eslint-language-server.config]
validate = "on"
experimental = { useFlatConfig = true }
rulesCustomizations = []
run = "onType"
problems = { shortenToSingleLine = false }
nodePath = ""

[language-server.flint]
command = "fnm"
args = ["exec", "--", "npx", "flint", "lsp"]

[language-server.basedpyright]
command = "uv"
args = ["run", "basedpyright-langserver", "--stdio"]

[language-server.ruff]
command = "uv"
args = ["run", "ruff", "server"]

[language-server.sourcery]
command = "sourcery"
args = ["lsp"]
config = { token = "SOURCERY_TOKEN", extension_version = "helix.lsp", editor_version = "helix" }

[language-server.cspell]
command = "cspell-lsp"
args = ["--stdio"]

# JavaScript/TypeScript - Biome for formatting, ESLint + Flint for linting

[[language]]
name = "javascript"
auto-format = true
language-servers = [
  { name = "typescript-language-server", except-features = ["format"] },
  "vscode-eslint-language-server",
  { name = "flint", only-features = ["diagnostics", "code-action"] },
  { name = "sourcery", only-features = ["diagnostics", "code-action"] },
  { name = "cspell", only-features = ["diagnostics", "code-action"] },
  "biome",
]

[[language]]
name = "typescript"
auto-format = true
language-servers = [
  { name = "typescript-language-server", except-features = ["format"] },
  "vscode-eslint-language-server",
  { name = "flint", only-features = ["diagnostics", "code-action"] },
  { name = "sourcery", only-features = ["diagnostics", "code-action"] },
  { name = "cspell", only-features = ["diagnostics", "code-action"] },
  "biome",
]

[[language]]
name = "jsx"
auto-format = true
language-servers = [
  { name = "typescript-language-server", except-features = ["format"] },
  "vscode-eslint-language-server",
  { name = "flint", only-features = ["diagnostics", "code-action"] },
  { name = "sourcery", only-features = ["diagnostics", "code-action"] },
  { name = "cspell", only-features = ["diagnostics", "code-action"] },
  "biome",
]

[[language]]
name = "tsx"
auto-format = true
language-servers = [
  { name = "typescript-language-server", except-features = ["format"] },
  "vscode-eslint-language-server",
  { name = "flint", only-features = ["diagnostics", "code-action"] },
  { name = "sourcery", only-features = ["diagnostics", "code-action"] },
  { name = "cspell", only-features = ["diagnostics", "code-action"] },
  "biome",
]

# Python - Basedpyright for types, Ruff for formatting/linting

[[language]]
name = "python"
auto-format = true
language-servers = [{ name = "basedpyright", except-features = ["format"] }, "ruff", { name = "sourcery", only-features = ["diagnostics", "code-action"] }, { name = "cspell", only-features = ["diagnostics", "code-action"] }]

# JSON
[[language]]
name = "json"
auto-format = true
language-servers = ["vscode-json-language-server"]

[language-server.vscode-json-language-server]
command = "vscode-json-language-server"
args = ["--stdio"]

[language-server.vscode-json-language-server.config.json.schemas]
"https://json.schemastore.org/package.json" = ["package.json"]
"https://json.schemastore.org/tsconfig.json" = ["tsconfig.json", "tsconfig.*.json"]
"https://json.schemastore.org/biome.json" = ["biome.json", "biome.jsonc"]
"https://json.schemastore.org/eslintrc.json" = [".eslintrc", ".eslintrc.json"]
"https://json.schemastore.org/pyrightconfig.json" = ["pyrightconfig.json"]

# Shell — bash-language-server uses shellcheck for diagnostics

[language-server.bash-language-server]
command = "bash-language-server"
args = ["start"]

# TOML

[language-server.taplo]
command = "taplo"
args = ["lsp", "stdio"]

# YAML

[language-server.yaml-language-server]
command = "yaml-language-server"
args = ["--stdio"]

[language-server.yaml-language-server.config.yaml]
schemas = { "https://json.schemastore.org/github-workflow.json" = ".github/workflows/*.yml" }
validation = true
completion = true

# CSS / HTML

[language-server.vscode-css-language-server]
command = "vscode-css-language-server"
args = ["--stdio"]

[language-server.vscode-html-language-server]
command = "vscode-html-language-server"
args = ["--stdio"]

[language-server.stylelint-lsp]
command = "stylelint-lsp"
args = ["--stdio"]

# Rust
[[language]]
name = "rust"
auto-format = true
language-servers = ["rust-analyzer", { name = "cspell", only-features = ["diagnostics", "code-action"] }]
formatter = { command = "rustfmt" }

# Shell
[[language]]
name = "bash"
auto-format = true
language-servers = ["bash-language-server", { name = "cspell", only-features = ["diagnostics", "code-action"] }]
formatter = { command = "shfmt", args = ["-i", "2"] }

# TOML
[[language]]
name = "toml"
auto-format = true
language-servers = ["taplo", { name = "cspell", only-features = ["diagnostics", "code-action"] }]
formatter = { command = "taplo", args = ["format", "-"] }

# YAML
[[language]]
name = "yaml"
auto-format = true
language-servers = ["yaml-language-server", { name = "cspell", only-features = ["diagnostics", "code-action"] }]

# Markdown
[[language]]
name = "markdown"
auto-format = true
language-servers = [{ name = "cspell", only-features = ["diagnostics", "code-action"] }]
formatter = { command = "markdownlint-cli2", args = ["--fix"] }

# CSS / SCSS
[[language]]
name = "css"
auto-format = true
language-servers = ["vscode-css-language-server", { name = "stylelint-lsp", only-features = ["diagnostics"] }, { name = "cspell", only-features = ["diagnostics", "code-action"] }]

[[language]]
name = "scss"
auto-format = true
language-servers = ["vscode-css-language-server", { name = "stylelint-lsp", only-features = ["diagnostics"] }, { name = "cspell", only-features = ["diagnostics", "code-action"] }]

# HTML
[[language]]
name = "html"
auto-format = true
language-servers = ["vscode-html-language-server", { name = "cspell", only-features = ["diagnostics", "code-action"] }]
