[language-server.rust-analyzer]
config = { check = { command = "clippy", extraArgs = [
  "--",
  "--force-warn",
  "clippy::pedantic",
  "-Dwarnings",
] }, diagnostics = { styleLints = { enable = true } }, inlayHints = { closureStyle = "rust_analyzer", typeHints = { hideNamedConstructor = true, hideClosureInitialization = true }, expressionAdjustmentHints = { enable = "reborrow" }, closureCaptureHints = { enable = true } }, semanticHighlighting = { punctuation = { enable = true, specialization = { enable = true }, separate = { macro = { bang = true } } }, operator = { specialization = { enable = true } } }, lens = { references = { adt = { enable = true }, enumVariant = { enable = true }, method = { enable = true }, trait = { enable = true } } } }

[language-server.biome]
command = "biome"
args = ["lsp-proxy"]

[language-server.vscode-eslint-language-server]
command = "vscode-eslint-language-server"
args = ["--stdio"]

[language-server.vscode-eslint-language-server.config]
validate = "on"
experimental = { useFlatConfig = true }
rulesCustomizations = []
run = "onType"
problems = { shortenToSingleLine = false }
nodePath = ""

[language-server.flint]
command = "fnm"
args = ["exec", "--using=default", "--", "npx", "flint", "lsp"]

[language-server.basedpyright]
command = "basedpyright-langserver"
args = ["--stdio"]

[language-server.ruff]
command = "ruff"
args = ["server"]

[language-server.sourcery]
command = "sourcery"
args = ["lsp"]
config = { token = "SOURCERY_TOKEN", extension_version = "helix.lsp", editor_version = "helix" }

[language-server.vscode-json-language-server.config.json.schemas]
"https://json.schemastore.org/package.json" = ["package.json"]
"https://json.schemastore.org/tsconfig.json" = [
  "tsconfig.json",
  "tsconfig.*.json",
]
"https://json.schemastore.org/biome.json" = ["biome.json", "biome.jsonc"]
"https://json.schemastore.org/eslintrc.json" = [".eslintrc", ".eslintrc.json"]
"https://json.schemastore.org/pyrightconfig.json" = ["pyrightconfig.json"]

[language-server.yaml-language-server.config.yaml]
schemas = { "https://json.schemastore.org/github-workflow.json" = ".github/workflows/*.yml" }
validation = true
completion = true

[language-server.stylelint-lsp]
command = "stylelint-lsp"
args = ["--stdio"]

[[language]]
name = "javascript"
auto-format = true
language-servers = [
  { name = "typescript-language-server", except-features = [
    "format",
  ] },
  "vscode-eslint-language-server",
  { name = "flint", only-features = [
    "diagnostics",
    "code-action",
  ] },
  { name = "sourcery", only-features = [
    "diagnostics",
    "code-action",
  ] },
  "biome",
]

