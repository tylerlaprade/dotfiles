# Language Servers

[language-server.rust-analyzer]
config = { check = { command = "clippy", extraArgs = ["--", "--force-warn", "clippy::pedantic", "-Dwarnings"] }, diagnostics = { styleLints = { enable = true } }, inlayHints = { closureStyle = "rust_analyzer", typeHints = { hideNamedConstructor = true, hideClosureInitialization = true }, expressionAdjustmentHints = { enable = "reborrow" }, closureCaptureHints = { enable = true } } }

[language-server.biome]
command = "bunx"
args = ["biome", "lsp-proxy"]

[language-server.vscode-eslint-language-server]
command = "vscode-eslint-language-server"
args = ["--stdio"]

[language-server.vscode-eslint-language-server.config]
validate = "on"
experimental = { useFlatConfig = true }
rulesCustomizations = []
run = "onType"
problems = { shortenToSingleLine = false }
nodePath = ""

[language-server.basedpyright]
command = "uv"
args = ["run", "basedpyright-langserver", "--stdio"]

[language-server.ruff]
command = "uv"
args = ["run", "ruff", "server"]

# JavaScript/TypeScript - Biome for formatting, ESLint for linting

[[language]]
name = "javascript"
language-servers = [
  { name = "typescript-language-server", except-features = ["format"] },
  "vscode-eslint-language-server",
  "biome",
]

[[language]]
name = "typescript"
language-servers = [
  { name = "typescript-language-server", except-features = ["format"] },
  "vscode-eslint-language-server",
  "biome",
]

[[language]]
name = "jsx"
language-servers = [
  { name = "typescript-language-server", except-features = ["format"] },
  "vscode-eslint-language-server",
  "biome",
]

[[language]]
name = "tsx"
language-servers = [
  { name = "typescript-language-server", except-features = ["format"] },
  "vscode-eslint-language-server",
  "biome",
]

# Python - Basedpyright for types, Ruff for formatting/linting

[[language]]
name = "python"
language-servers = ["basedpyright", "ruff"]

# JSON
[[language]]
name = "json"
language-servers = ["vscode-json-language-server"]

[language-server.vscode-json-language-server]
command = "vscode-json-language-server"
args = ["--stdio"]

[language-server.vscode-json-language-server.config.json.schemas]
"https://json.schemastore.org/package.json" = ["package.json"]
"https://json.schemastore.org/tsconfig.json" = ["tsconfig.json", "tsconfig.*.json"]
"https://json.schemastore.org/biome.json" = ["biome.json", "biome.jsonc"]
"https://json.schemastore.org/eslintrc.json" = [".eslintrc", ".eslintrc.json"]
"https://json.schemastore.org/pyrightconfig.json" = ["pyrightconfig.json"]

# Shell — bash-language-server uses shellcheck for diagnostics

[language-server.bash-language-server]
command = "bash-language-server"
args = ["start"]

# TOML

[language-server.taplo]
command = "taplo"
args = ["lsp", "stdio"]

# YAML

[language-server.yaml-language-server]
command = "yaml-language-server"
args = ["--stdio"]

[language-server.yaml-language-server.config.yaml]
schemas = { "https://json.schemastore.org/github-workflow.json" = ".github/workflows/*.yml" }
validation = true
completion = true

# CSS / HTML

[language-server.vscode-css-language-server]
command = "vscode-css-language-server"
args = ["--stdio"]

[language-server.vscode-html-language-server]
command = "vscode-html-language-server"
args = ["--stdio"]

# Rust
[[language]]
name = "rust"
formatter = { command = "rustfmt" }

# Shell
[[language]]
name = "bash"
language-servers = ["bash-language-server"]
formatter = { command = "shfmt", args = ["-i", "2"] }

# TOML
[[language]]
name = "toml"
language-servers = ["taplo"]
formatter = { command = "taplo", args = ["format", "-"] }

# YAML
[[language]]
name = "yaml"
language-servers = ["yaml-language-server"]

# Markdown
[[language]]
name = "markdown"
formatter = { command = "markdownlint-cli2", args = ["--fix"] }

# CSS / SCSS
[[language]]
name = "css"
language-servers = ["vscode-css-language-server"]

[[language]]
name = "scss"
language-servers = ["vscode-css-language-server"]

# HTML
[[language]]
name = "html"
language-servers = ["vscode-html-language-server"]
